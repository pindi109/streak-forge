name: streak_forge
description: A habit tracker app with daily streaks, reminders and progress charts
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.19
  google_sign_in: ^6.2.1
  provider: ^6.1.1
  fl_chart: ^0.66.2
  flutter_local_notifications: ^16.3.2
  timezone: ^0.9.2
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  percent_indicator: ^4.2.3
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
